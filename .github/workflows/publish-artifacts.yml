name: Publish Artifacts

on:
  workflow_call:
    inputs:
      package_version:
        description: "Optional package version, usually the release tag without the leading v."
        required: false
        type: string

permissions:
  contents: read

jobs:
  package:
    name: Pack library
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore src/ModularityKit.Mutator.csproj

      - name: Resolve package version
        id: version
        env:
          PACKAGE_VERSION: ${{ inputs.package_version }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          version="$PACKAGE_VERSION"
          if [ -z "$version" ]; then
            version="$REF_NAME"
          fi
          version="${version#v}"
          if ! printf '%s' "$version" | grep -Eq '^[0-9]+(\.[0-9]+){1,2}([-+][0-9A-Za-z.-]+)?$'; then
            version="0.1.0"
          fi
          echo "package_version=$version" >> "$GITHUB_OUTPUT"

      - name: Pack package
        run: >
          dotnet pack src/ModularityKit.Mutator.csproj
          -c Release
          --no-restore
          -o nupkg
          -p:PackageVersion=${{ steps.version.outputs.package_version }}

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: ModularityKit.Mutator-nupkg
          path: nupkg/*.nupkg
